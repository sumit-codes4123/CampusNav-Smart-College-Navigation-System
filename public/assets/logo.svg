<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f6ef7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7b5ff7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer glow ring -->
  <circle cx="120" cy="120" r="108" fill="none" stroke="#4f6ef7" stroke-width="1" opacity="0.2"/>
  <circle cx="120" cy="120" r="100" fill="none" stroke="#7b5ff7" stroke-width="0.5" opacity="0.15"/>

  <!-- Shield body -->
  <path d="M120 28 L178 52 L178 118 C178 154 148 178 120 192 C92 178 62 154 62 118 L62 52 Z"
        fill="url(#shieldGrad)" filter="url(#glow)"/>

  <!-- Shield shine overlay -->
  <path d="M120 28 L178 52 L178 90 C178 90 148 80 120 80 C92 80 62 90 62 90 L62 52 Z"
        fill="url(#glowGrad)"/>

  <!-- Shield border -->
  <path d="M120 28 L178 52 L178 118 C178 154 148 178 120 192 C92 178 62 154 62 118 L62 52 Z"
        fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>

  <!-- Graduation cap icon inside shield -->
  <!-- Cap board -->
  <polygon points="120,78  152,93  120,108  88,93" fill="white" opacity="0.95"/>
  <!-- Cap top line -->
  <line x1="120" y1="78" x2="120" y2="68" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Cap dot -->
  <circle cx="120" cy="66" r="4" fill="#f0c040"/>

  <!-- Tassel string -->
  <path d="M152 93 L152 108" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
  <circle cx="152" cy="111" r="3" fill="#f0c040"/>

  <!-- Open book below cap -->
  <path d="M98 122 C98 118 108 116 120 116 C132 116 142 118 142 122 L142 142 C142 142 132 139 120 139 C108 139 98 142 98 142 Z"
        fill="white" opacity="0.15" stroke="white" stroke-width="1.2" stroke-opacity="0.6"/>
  <line x1="120" y1="116" x2="120" y2="139" stroke="white" stroke-width="1.2" opacity="0.6"/>

  <!-- Navigation compass pin (subtle) -->
  <circle cx="120" cy="162" r="6" fill="white" opacity="0.2"/>
  <circle cx="120" cy="162" r="3" fill="#f0c040" opacity="0.8"/>

  <!-- Text: CampusNav -->
  <text x="120" y="212" font-family="'Syne', 'Arial Black', sans-serif" font-size="20"
        font-weight="800" fill="#f0f2f8" text-anchor="middle" letter-spacing="-0.5">
    CampusNav
  </text>

  <!-- Subtitle -->
  <text x="120" y="228" font-family="'DM Sans', Arial, sans-serif" font-size="9"
        font-weight="400" fill="#9ba3c4" text-anchor="middle" letter-spacing="1.5">
    COLLEGE NAVIGATION SYSTEM
  </text>
</svg>
